# Local development PostgreSQL
services:
  db:
    image: postgres:16-alpine
    container_name: gogocity-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gogocity
    ports:
      - "5432:5432"
    volumes:
      - gogocity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gogocity_postgres_data:
